<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Những bản nhạc anh Hiển rất thích</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color:white;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:auto;
            padding:30px;
        }

        h1{
            margin-bottom:40px;
            font-size:40px;
        }

        .video-box{
            background: rgba(255,255,255,0.1);
            padding:20px;
            margin-bottom:40px;
            border-radius:20px;
            box-shadow:0 0 15px rgba(0,0,0,0.4);
        }

        iframe{
            width:100%;
            height:500px;
            border:none;
            border-radius:15px;
        }

        h2{
            margin-bottom:20px;
        }

        .footer{
            margin-top:30px;
            opacity:0.8;
        }

        @media(max-width:768px){
            iframe{
                height:250px;
            }

            h1{
                font-size:28px;
            }
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 Những bản nhạc  🎵</h1>

        <div class="video-box">
            <h2>Bản nhạc 1</h2>
            <iframe src="https://www.youtube.com/embed/AZcVyhccVug"
            allowfullscreen></iframe>
        </div>

        <div class="video-box">
            <h2>Bản nhạc 2</h2>
            <iframe src="https://www.youtube.com/embed/hBkxntRzHro"
            allowfullscreen></iframe>
        </div>

        <div class="video-box">
            <h2>Bản nhạc 3</h2>
            <iframe src="https://www.youtube.com/embed/27QLMhOpi3g"
            allowfullscreen></iframe>
        </div>

        <div class="video-box">
            <h2>Bản nhạc 4</h2>
            <iframe src="https://www.youtube.com/embed/ckPDv0SxFPA"
            allowfullscreen></iframe>
        </div>

        <div class="video-box">
            <h2>Bản nhạc 5</h2>
            <iframe src="https://www.youtube.com/embed/MhhgXDcrrRI"
            allowfullscreen></iframe>
        </div>

        <div class="footer">
            💙 Website âm nhạc bằng HTML & CSS
        </div>

    </div>

</body>
</html>
